services:
  ubersdr_dxcluster:
    image: madpsy/ubersdr_dxcluster:latest
    container_name: dxcluster
    restart: unless-stopped
    cpu_shares: 512
    environment:
      # UberSDR base HTTP URL (SSE streams are fetched over HTTP, not WebSocket)
      UBERSDR_URL: "http://ubersdr:8080"
      #
      # Callsign shown as spotter in telnet DX cluster spots (default: UBERSDR)
      # SPOTTER_CALL: "UBERSDR"
      #
      # Web UI port (default: 6087)
      # WEB_PORT: "6087"
      #
      # DX cluster telnet port (default: 7300)
      # TELNET_PORT: "7300"
      #
      # Require a valid callsign login on telnet connect (default: true)
      # Set to "false" to allow anonymous connections
      # REQUIRE_LOGIN: "true"
      #
      # Directory for persistent data (SQLite spot database)
      # DATA_DIR: "/data"
      #
      # Days of spot history to retain in the database (default: 30)
      # Older spots are purged daily and the DB file is shrunk on disk.
      # RETENTION_DAYS: "30"
      #
      # Voice spot dedup window in minutes (default: 10, set to 0 to disable)
      # Prevents the same voice signal (callsign+freq+mode) being stored more
      # than once per window. Real-time streaming is unaffected.
      # VOICE_DEDUP_MINS: "10"
      #
      # Decoder (digital) spot dedup window in minutes (default: 5, set to 0 to disable)
      # Prevents the same digital spot (callsign+band+mode e.g. FT8/FT4) being stored
      # more than once per window. Real-time streaming is unaffected.
      # DECODER_DEDUP_MINS: "5"
      #
      # Maximum simultaneous web-terminal (WebSocket) sessions across all IPs (default: 25)
      # WS_MAX_CONNS: "25"
      #
      # Maximum simultaneous web-terminal sessions from a single IP address (default: 2)
      # WS_MAX_CONNS_PER_IP: "2"
      #
      # Password required to submit spots via the DX command (default: disabled)
      # Set to a non-empty string to allow authenticated users to submit manual spots.
      # After login, users must send SET/SPOTPASS <password> to enable submission.
      # Spots are validated (10 kHz – 30 MHz, valid callsign) before being broadcast
      # to all connected clients and saved to the database.
      # WARNING: the password travels in plaintext over raw telnet; the WebSocket
      # terminal (HTTPS) is strongly preferred for spot submission.
      # SPOT_PASSWORD: "changeme"
      #
      # Note: reverse-proxy base path is read automatically from
      # the X-Forwarded-Prefix header — no configuration needed.
    ports:
      - "7300:7300"
    networks:
      - sdr-network
    volumes:
      - ./dxcluster_data:/data
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "127.0.0.1:24224"
        fluentd-async: "true"
        tag: "dxcluster"

networks:
  sdr-network:
    external: true
    name: ubersdr_sdr-network
